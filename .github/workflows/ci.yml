name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          # pinned to the dev build clap-zig currently targets (0.17 is unreleased)
          version: 0.17.0-dev.305+bdfbf432d
      - run: zig build
      - run: zig build test --summary all
      - run: zig build coverage

  fmt:
    name: zig fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.305+bdfbf432d
      - run: zig fmt --check src tests examples build.zig build.zig.zon
